<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common Goods</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="mark">Common Goods</span>
    <span class="tag">EST. DEMO STORE</span>
  </div>
  <nav>
    <input type="text" id="searchInput" class="search-input" placeholder="Search products…">
    <button class="icon-btn" id="cartOpenBtn">Cart <span class="cart-count" id="cartCount">0</span></button>
    <span id="authArea"></span>
  </nav>
</header>

<main>
  <div class="page-head">
    <div>
      <h1>Everyday goods, sorted.</h1>
      <p>Browse the catalog, add what you need, check out when you're ready.</p>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="productGrid"></div>
</main>

<!-- Cart drawer -->
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="cartDrawer">
  <div class="drawer-head">
    <h2>Your cart</h2>
    <button class="modal-close" id="cartCloseBtn" aria-label="Close cart">✕</button>
  </div>
  <div class="drawer-body" id="cartBody"></div>
  <div class="drawer-foot" id="cartFooter"></div>
</aside>

<!-- Auth modal -->
<div class="modal-overlay" id="authModalOverlay">
  <div class="modal">
    <button class="modal-close" id="authModalClose" aria-label="Close">✕</button>
    <div class="tabs">
      <button class="tab-btn active" id="loginTab" type="button">Log in</button>
      <button class="tab-btn" id="registerTab" type="button">Create account</button>
    </div>
    <div class="form-error" id="authError"></div>

    <form id="loginForm">
      <div class="field"><label for="loginEmail">Email</label><input type="email" id="loginEmail" required></div>
      <div class="field"><label for="loginPassword">Password</label><input type="password" id="loginPassword" required></div>
      <div class="modal-actions"><button type="submit" class="btn">Log in</button></div>
      <p class="modal-sub">Admin demo login: admin@example.com / Admin@123</p>
    </form>

    <form id="registerForm" style="display:none">
      <div class="field"><label for="regName">Name</label><input type="text" id="regName" required></div>
      <div class="field"><label for="regEmail">Email</label><input type="email" id="regEmail" required></div>
      <div class="field"><label for="regPassword">Password</label><input type="password" id="regPassword" minlength="6" required></div>
      <div class="modal-actions"><button type="submit" class="btn">Create account</button></div>
    </form>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal-overlay" id="checkoutModalOverlay">
  <div class="modal">
    <button class="modal-close" id="checkoutModalClose" aria-label="Close">✕</button>
    <h2>Checkout</h2>
    <p class="modal-sub">Review your order and confirm shipping.</p>
    <div class="form-error" id="checkoutError"></div>
    <div class="receipt" id="checkoutSummary" style="margin-bottom:16px;"></div>
    <form id="checkoutForm">
      <div class="field">
        <label for="shippingAddress">Shipping address</label>
        <textarea id="shippingAddress" placeholder="Street, city, postal code"></textarea>
      </div>
      <div class="modal-actions"><button type="submit" class="btn">Place order</button></div>
    </form>
  </div>
</div>

<!-- Receipt modal -->
<div class="modal-overlay" id="receiptModalOverlay">
  <div class="modal">
    <button class="modal-close" id="receiptModalClose" aria-label="Close">✕</button>
    <div id="receiptBody"></div>
    <div class="modal-actions"><button class="btn" id="receiptDoneBtn">Done</button></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
